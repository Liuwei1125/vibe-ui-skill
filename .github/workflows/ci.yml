name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    name: Test, syntax, and package plans
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Release check
        run: npm run release:check

      - name: Package dry run
        run: npm run release:dry-run
